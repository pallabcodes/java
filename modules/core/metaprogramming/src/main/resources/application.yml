# Netflix Production-Grade Meta Programming Configuration
server:
  port: 8080
  servlet:
    context-path: /meta-programming
  tomcat:
    threads:
      max: 200
      min-spare: 10
    max-connections: 8192
    accept-count: 100
    connection-timeout: 20000ms

spring:
  application:
    name: java-meta-programming
  profiles:
    active: dev
  
  # Meta Programming Configuration
  aop:
    auto: true
    proxy-target-class: true
  
  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false
      enable-statistics: true
  
  # Data Source Configuration
  datasource:
    url: jdbc:h2:mem:metaprogramming
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
  
  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# Meta Programming Specific Configuration
meta-programming:
  reflection:
    enabled: true
    cache-enabled: true
    cache-size: 1000
    security-manager-enabled: false
  
  annotations:
    processing-enabled: true
    runtime-retention: true
    compile-time-retention: true
  
  proxies:
    dynamic-proxies-enabled: true
    cglib-proxies-enabled: true
    jdk-proxies-enabled: true
  
  bytecode:
    manipulation-enabled: true
    asm-enabled: true
    javassist-enabled: true
    cglib-enabled: true
  
  serialization:
    jackson-enabled: true
    custom-serializers-enabled: true
    polymorphic-serialization-enabled: true
  
  monitoring:
    metrics-enabled: true
    tracing-enabled: true
    performance-monitoring-enabled: true

# Logging Configuration
logging:
  level:
    netflix.metaprogramming: DEBUG
    org.springframework.aop: DEBUG
    org.aspectj: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{36}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{36}] - %msg%n"
  file:
    name: logs/meta-programming.log
    max-size: 100MB
    max-history: 30

# Management and Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,beans,configprops,env,loggers,threaddump,heapdump
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1s, 2s, 5s

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: netflix.metaprogramming

# Netflix Production Standards
netflix:
  production:
    enabled: true
    monitoring:
      enabled: true
      metrics:
        enabled: true
        custom-metrics: true
      tracing:
        enabled: true
        sampling-rate: 1.0
    security:
      enabled: true
      rate-limiting:
        enabled: true
        requests-per-minute: 1000
    performance:
      enabled: true
      profiling:
        enabled: true
        sampling-rate: 0.1
