rootProject.name = 'JavaMetaProgramming'

// Project metadata
project.description = 'Netflix Production-Grade Java Meta Programming Examples'
project.version = '1.0.0'
project.group = 'netflix.metaprogramming'

// Build configuration
gradle.settingsEvaluated { settings ->
    settings.gradle.projectsLoaded { projects ->
        projects.all { project ->
            project.tasks.withType(JavaCompile) {
                options.compilerArgs += [
                    '--enable-preview',
                    '--add-modules', 'jdk.incubator.vector'
                ]
            }
        }
    }
}
