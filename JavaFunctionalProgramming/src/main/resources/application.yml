# Netflix Production-Grade Java Functional Programming Application Configuration
# This configuration demonstrates advanced Java Functional Programming concepts with real-world examples

spring:
  application:
    name: netflix-java-functional-programming
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  
  # Redis Configuration for Caching
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 2000ms
  
  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 1 hour
      cache-null-values: false

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-stacktrace: never
    include-message: always

# Netflix Production Logging Configuration
logging:
  level:
    root: INFO
    netflix.functional: ${LOG_LEVEL:INFO}
    org.springframework.web: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId},%X{spanId}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId},%X{spanId}] %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE_PATH:logs/netflix-java-functional-programming.log}

# Netflix Java Functional Programming Configuration
functional:
  examples:
    enable-functional-interfaces: ${ENABLE_FUNCTIONAL_INTERFACES:true}
    enable-lambda-expressions: ${ENABLE_LAMBDA_EXPRESSIONS:true}
    enable-method-references: ${ENABLE_METHOD_REFERENCES:true}
    enable-streams: ${ENABLE_STREAMS:true}
    enable-optional: ${ENABLE_OPTIONAL:true}
    enable-completable-future: ${ENABLE_COMPLETABLE_FUTURE:true}
    enable-reactive-programming: ${ENABLE_REACTIVE_PROGRAMMING:true}
    enable-custom-functional: ${ENABLE_CUSTOM_FUNCTIONAL:true}
    enable-higher-order-functions: ${ENABLE_HIGHER_ORDER_FUNCTIONS:true}
    enable-monadic-operations: ${ENABLE_MONADIC_OPERATIONS:true}
    enable-currying: ${ENABLE_CURRYING:true}
    enable-partial-application: ${ENABLE_PARTIAL_APPLICATION:true}
    enable-function-composition: ${ENABLE_FUNCTION_COMPOSITION:true}
    enable-immutable-data: ${ENABLE_IMMUTABLE_DATA:true}
    enable-pattern-matching: ${ENABLE_PATTERN_MATCHING:true}
  performance:
    enable-caching: ${ENABLE_CACHING:true}
    enable-metrics: ${ENABLE_METRICS:true}
    enable-profiling: ${ENABLE_PROFILING:false}
    enable-parallel-streams: ${ENABLE_PARALLEL_STREAMS:true}
    enable-async-processing: ${ENABLE_ASYNC_PROCESSING:true}
  security:
    enable-validation: ${ENABLE_VALIDATION:true}
    enable-sanitization: ${ENABLE_SANITIZATION:true}

# Netflix Observability Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}

# Netflix API Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: netflix.functional.controller
