# Application Configuration
spring.application.name=producer-consumer-service
server.port=8080

# JWT Configuration
jwt.secret=${JWT_SECRET:netflix-producer-consumer-secret-key-32-chars}
jwt.access-token-expiry=${JWT_ACCESS_TOKEN_EXPIRY:3600000}
jwt.refresh-token-expiry=${JWT_REFRESH_TOKEN_EXPIRY:86400000}

# Kafka Configuration
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.topic.name=${KAFKA_TOPIC_NAME:test-topic}
kafka.consumer.group.id=${KAFKA_CONSUMER_GROUP_ID:metrics-consumer-group}
kafka.key.serializer=${KAFKA_KEY_SERIALIZER:org.apache.kafka.common.serialization.StringSerializer}
kafka.value.serializer=${KAFKA_VALUE_SERIALIZER:org.apache.kafka.common.serialization.StringSerializer}

# Spring Kafka Configuration (for future use)
spring.kafka.bootstrap-servers=${kafka.bootstrap.servers}
spring.kafka.consumer.group-id=${kafka.consumer.group.id}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.producer.key-serializer=${kafka.key.serializer}
spring.kafka.producer.value-serializer=${kafka.value.serializer}
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

# Actuator Configuration
management.endpoints.web.exposure.include=health,metrics,info,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# Logging Configuration
logging.level.org.springframework.kafka=WARN
logging.level.org.springframework.security=WARN
logging.level.org.example=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Security Configuration
spring.security.enabled=true