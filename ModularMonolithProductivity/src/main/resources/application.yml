server:
  port: 8080

spring:
  application:
    name: modular-monolith-productivity
  datasource:
    url: jdbc:postgresql://localhost:5432/productivity
    username: user
    password: pass
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    com.netflix.productivity: DEBUG

