apiVersion: apps/v1
kind: Deployment
metadata:
  name: clean-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clean-service
  template:
    metadata:
      labels:
        app: clean-service
    spec:
      containers:
        - name: app
          image: yourorg/clean-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
