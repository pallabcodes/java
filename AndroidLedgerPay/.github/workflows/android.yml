name: Android CI
on:
  push:
    branches: [ main, projects ]
  pull_request:
    branches: [ main, projects ]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4
      - name: Build
        working-directory: AndroidLedgerPay
        run: ./gradlew assembleDebug --stacktrace
      - name: Unit tests
        working-directory: AndroidLedgerPay
        run: ./gradlew testDebugUnitTest --stacktrace
      - name: Android Lint
        working-directory: AndroidLedgerPay
        run: ./gradlew lint --stacktrace
      - name: Static analysis
        working-directory: AndroidLedgerPay
        run: ./gradlew ktlintCheck detekt --stacktrace

  instrumentation:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4
      - name: Start emulator, run UI tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_5
          script: cd AndroidLedgerPay && ./gradlew connectedDebugAndroidTest --stacktrace
