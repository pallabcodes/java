server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,env
  endpoint:
    health:
      probes:
        enabled: true

spring:
  application:
    name: spring-ai-project
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:arbitrary-key}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
      embedding:
        options:
          model: ${OPENAI_EMBED_MODEL:text-embedding-3-small}

resilience4j:
  retry:
    instances:
      chat:
        max-attempts: 3
        wait-duration: 200ms
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
      embed:
        max-attempts: 3
        wait-duration: 200ms
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException

logging:
  level:
    root: INFO
    com.netflix.springai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{correlationId}] %logger - %msg%n"
