# Production values for streaming-platform Helm chart

# Global configuration
global:
  imageRegistry: "your-registry.com"
  imagePullSecrets:
    - name: registry-secret
  storageClass: "fast-ssd"

# Infrastructure Service - Production settings
infrastructure:
  replicaCount: 3
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi
  env:
    LOGGING_LEVEL_COM_NETFLIX_STREAMING: "WARN"

# Analytics Service - Production settings
analytics:
  replicaCount: 5
  resources:
    limits:
      cpu: 4000m
      memory: 4Gi
    requests:
      cpu: 2000m
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 5
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  env:
    LOGGING_LEVEL_COM_NETFLIX_STREAMING: "WARN"

# Playback Service - Production settings
playback:
  replicaCount: 8
  resources:
    limits:
      cpu: 3000m
      memory: 3Gi
    requests:
      cpu: 1500m
      memory: 1.5Gi
  autoscaling:
    enabled: true
    minReplicas: 8
    maxReplicas: 30
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  env:
    LOGGING_LEVEL_COM_NETFLIX_STREAMING: "WARN"

# ML Pipeline Service - Production settings
mlPipeline:
  replicaCount: 2
  resources:
    limits:
      cpu: 6000m
      memory: 8Gi
      nvidia.com/gpu: 2
    requests:
      cpu: 3000m
      memory: 4Gi
      nvidia.com/gpu: 1
  env:
    LOGGING_LEVEL_COM_NETFLIX_STREAMING: "INFO"

# Database - Production settings
postgresql:
  architecture: replication
  primary:
    persistence:
      size: 500Gi
      storageClass: "fast-ssd"
    resources:
      limits:
        cpu: 4000m
        memory: 8Gi
      requests:
        cpu: 2000m
        memory: 4Gi
  readReplicas:
    replicaCount: 3
    persistence:
      size: 500Gi
      storageClass: "fast-ssd"
    resources:
      limits:
        cpu: 2000m
        memory: 4Gi
      requests:
        cpu: 1000m
        memory: 2Gi

# Kafka - Production settings
kafka:
  replicas: 5
  persistence:
    size: 1Ti
    storageClass: "fast-ssd"
  resources:
    requests:
      memory: 4Gi
      cpu: 2000m
    limits:
      memory: 8Gi
      cpu: 4000m
  zookeeper:
    persistence:
      size: 100Gi
      storageClass: "fast-ssd"

# Redis - Production settings
redis:
  architecture: replication
  master:
    persistence:
      size: 100Gi
      storageClass: "fast-ssd"
    resources:
      limits:
        cpu: 2000m
        memory: 4Gi
      requests:
        cpu: 1000m
        memory: 2Gi
  replica:
    replicaCount: 3
    persistence:
      size: 100Gi
      storageClass: "fast-ssd"

# Monitoring - Production settings
monitoring:
  prometheus:
    server:
      persistentVolume:
        size: 200Gi
        storageClass: "fast-ssd"
      resources:
        limits:
          cpu: 2000m
          memory: 4Gi
        requests:
          cpu: 1000m
          memory: 2Gi
  grafana:
    persistence:
      size: 50Gi
      storageClass: "fast-ssd"
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi

# Ingress - Production enabled
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
  hosts:
    - host: api.streaming-platform.yourcompany.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: streaming-platform-tls
      hosts:
        - api.streaming-platform.yourcompany.com

# Service Account with IRSA (IAM Roles for Service Accounts)
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/streaming-platform-service-role"

# Pod Disruption Budget - Production strict
podDisruptionBudget:
  enabled: true

# Security Context - Production hardening
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Node Selector - Production node types
nodeSelector:
  environment: production
  node-type: compute-optimized

# Tolerations - Production taints
tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "streaming-platform"
    effect: "NoSchedule"

# Affinity - Production scheduling
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/os
          operator: In
          values:
          - linux
        - key: environment
          operator: In
          values:
          - production
