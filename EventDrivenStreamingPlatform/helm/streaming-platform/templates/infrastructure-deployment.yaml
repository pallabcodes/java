{{- if .Values.infrastructure.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "streaming-platform.fullname" . }}-infrastructure
  labels:
    {{- include "streaming-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: infrastructure
spec:
  replicas: {{ .Values.infrastructure.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "streaming-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: infrastructure
  template:
    metadata:
      labels:
        {{- include "streaming-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: infrastructure
    spec:
      serviceAccountName: {{ include "streaming-platform.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
      - name: infrastructure
        image: {{ include "streaming-platform.image" .Values.infrastructure.image | quote }}
        imagePullPolicy: {{ .Values.infrastructure.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.infrastructure.service.targetPort }}
          protocol: TCP
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "{{ .Values.infrastructure.env.SPRING_PROFILES_ACTIVE }}"
        - name: SERVER_PORT
          value: "{{ .Values.infrastructure.service.targetPort }}"
        - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
          value: "health,info,metrics,prometheus"
        - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
          value: "true"
        # Database configuration
        - name: DB_HOST
          value: "{{ include "streaming-platform.fullname" . }}-postgresql"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "streaming_platform"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ include "streaming-platform.fullname" . }}-postgresql
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "streaming-platform.fullname" . }}-postgresql
              key: password
        # Kafka configuration
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "{{ include "streaming-platform.fullname" . }}-kafka:9092"
        # Redis configuration
        - name: REDIS_HOST
          value: "{{ include "streaming-platform.fullname" . }}-redis-master"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "streaming-platform.fullname" . }}-redis
              key: redis-password
        # OpenTelemetry configuration
        - name: OTEL_SERVICE_NAME
          value: "infrastructure-service"
        - name: OTEL_SERVICE_VERSION
          value: "{{ .Chart.AppVersion }}"
        - name: OTEL_TRACES_EXPORTER
          value: "otlp"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://{{ include "streaming-platform.fullname" . }}-jaeger-collector:4317"
        - name: OTEL_METRICS_EXPORTER
          value: "prometheus"
        - name: OTEL_TRACES_SAMPLER
          value: "parentbased_always_on"
        {{- range $key, $value := .Values.infrastructure.env }}
        - name: {{ $key }}
          value: "{{ $value }}"
        {{- end }}
        resources:
          {{- toYaml .Values.infrastructure.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /actuator/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 30
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: logs-volume
          mountPath: /app/logs
      initContainers:
      - name: wait-for-db
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z {{ include "streaming-platform.fullname" . }}-postgresql 5432; do echo waiting for database; sleep 2; done;']
      - name: wait-for-kafka
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z {{ include "streaming-platform.fullname" . }}-kafka 9092; do echo waiting for kafka; sleep 2; done;']
      - name: wait-for-redis
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z {{ include "streaming-platform.fullname" . }}-redis-master 6379; do echo waiting for redis; sleep 2; done;']
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: logs-volume
        emptyDir: {}
      terminationGracePeriodSeconds: 30
      {{- with .Values.infrastructure.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.infrastructure.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.infrastructure.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "streaming-platform.fullname" . }}-infrastructure
  labels:
    {{- include "streaming-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: infrastructure
spec:
  type: {{ .Values.infrastructure.service.type }}
  ports:
  - port: {{ .Values.infrastructure.service.port }}
    targetPort: {{ .Values.infrastructure.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    {{- include "streaming-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: infrastructure
---
{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "streaming-platform.fullname" . }}-infrastructure-pdb
  labels:
    {{- include "streaming-platform.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "streaming-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: infrastructure
{{- end }}
{{- end }}
