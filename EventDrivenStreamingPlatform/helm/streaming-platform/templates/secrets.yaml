apiVersion: v1
kind: Secret
metadata:
  name: {{ include "streaming-platform.fullname" . }}-database-secret
  labels:
    {{- include "streaming-platform.labels" . | nindent 4 }}
type: Opaque
data:
  # Database credentials - these should be overridden in production
  host: {{ .Values.postgresql.enabled | ternary (printf "%s-postgresql" (include "streaming-platform.fullname" .)) "external-postgres" | b64enc }}
  name: {{ "streaming_platform" | b64enc }}
  username: {{ "streaming" | b64enc }}
  password: {{ "changeMe123" | b64enc }}  # Change this in production!
  analytics-db-name: {{ "analytics_service" | b64enc }}
  analytics-username: {{ "analytics" | b64enc }}
  analytics-password: {{ "changeMe123" | b64enc }}
  playback-db-name: {{ "playback_service" | b64enc }}
  playback-username: {{ "playback" | b64enc }}
  playback-password: {{ "changeMe123" | b64enc }}
  ml-db-name: {{ "ml_pipeline" | b64enc }}
  ml-username: {{ "ml" | b64enc }}
  ml-password: {{ "changeMe123" | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "streaming-platform.fullname" . }}-redis-secret
  labels:
    {{- include "streaming-platform.labels" . | nindent 4 }}
type: Opaque
data:
  host: {{ .Values.redis.enabled | ternary (printf "%s-redis-master" (include "streaming-platform.fullname" .)) "external-redis" | b64enc }}
  port: {{ "6379" | b64enc }}
  password: {{ "changeMe123" | b64enc }}  # Change this in production!
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "streaming-platform.fullname" . }}-kafka-secret
  labels:
    {{- include "streaming-platform.labels" . | nindent 4 }}
type: Opaque
data:
  bootstrap-servers: {{ .Values.kafka.enabled | ternary (printf "%s-kafka:9092" (include "streaming-platform.fullname" .)) "external-kafka:9092" | b64enc }}
  schema-registry-url: {{ .Values.kafka.enabled | ternary (printf "http://%s-schema-registry:8081" (include "streaming-platform.fullname" .)) "http://external-schema-registry:8081" | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "streaming-platform.fullname" . }}-jwt-secret
  labels:
    {{- include "streaming-platform.labels" . | nindent 4 }}
type: Opaque
data:
  # JWT signing key - MUST be changed in production!
  signing-key: {{ "your-super-secret-jwt-signing-key-change-this-in-production-32-chars-minimum" | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "streaming-platform.fullname" . }}-encryption-secret
  labels:
    {{- include "streaming-platform.labels" . | nindent 4 }}
type: Opaque
data:
  # AES encryption key for sensitive data - MUST be changed in production!
  aes-key: {{ "your-32-character-aes-encryption-key-change-this" | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "streaming-platform.fullname" . }}-external-apis-secret
  labels:
    {{- include "streaming-platform.labels" . | nindent 4 }}
type: Opaque
data:
  # External API keys - configure as needed
  cdn-api-key: {{ "" | b64enc }}
  analytics-api-key: {{ "" | b64enc }}
  monitoring-api-key: {{ "" | b64enc }}
