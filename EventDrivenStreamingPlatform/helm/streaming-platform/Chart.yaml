apiVersion: v2
name: streaming-platform
description: Event-Driven Video Streaming Analytics Platform
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - streaming
  - analytics
  - kafka
  - event-driven
  - microservices
home: https://github.com/netflix/streaming-platform
sources:
  - https://github.com/netflix/streaming-platform
maintainers:
  - name: Netflix Streaming Team
    email: streaming-team@netflix.com
dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: kafka
    version: "20.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: kafka.enabled
  - name: redis
    version: "17.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: prometheus
    version: "15.x.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: monitoring.enabled
  - name: grafana
    version: "6.x.x"
    repository: "https://grafana.github.io/helm-charts"
    condition: monitoring.enabled
