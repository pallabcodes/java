# Event-Driven Video Streaming Analytics Platform - Playback Service
# Event-Sourced CQRS Service with Transactional Outbox

server:
  port: 8082

spring:
  application:
    name: playback-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:playback_service}
    username: ${DB_USERNAME:playback_user}
    password: ${DB_PASSWORD:playback_password}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
        show_sql: ${SHOW_SQL:false}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# Axon Framework Configuration for CQRS + Event Sourcing
axon:
  serializer:
    general: jackson
    events: jackson
    messages: jackson

  eventhandling:
    processors:
      playback-events:
        mode: tracking
        source: eventStore
        thread-count: 4

# Application-specific configuration
app:
  playback:
    outbox:
      table-name: ${OUTBOX_TABLE:playback_outbox_events}
      processing-interval-ms: ${OUTBOX_INTERVAL:2000}
      batch-size: ${OUTBOX_BATCH_SIZE:100}
      max-retries: ${OUTBOX_MAX_RETRIES:3}

  event-sourcing:
    snapshot-threshold: ${SNAPSHOT_THRESHOLD:50}  # Snapshot every N events

# OpenTelemetry Configuration
opentelemetry:
  service:
    name: playback-service
    version: 1.0.0
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  traces:
    sampler: ${OTEL_TRACES_SAMPLER:always_on}

# Management & Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,axon
      base-path: /actuator

  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      service: playback-service
      component: cqrs-aggregate

  info:
    env:
      enabled: true

# Logging Configuration
logging:
  level:
    com.netflix.streaming.playback: ${LOG_LEVEL:INFO}
    org.axonframework: WARN
    org.springframework.kafka: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %highlight(%-5level) %cyan(%logger{36}) - %msg%n"
    correlation: "[%X{correlationId:-}] [%X{tenantId:-}] [%X{userId:-}]"

# Resilience Configuration
resilience4j:
  circuitbreaker:
    instances:
      command-handling:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10000
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2000

  retry:
    instances:
      event-publishing:
        max-attempts: 3
        waitDuration: 100
        retry-exceptions:
          - org.springframework.kafka.KafkaException

# Kafka Configuration (inherited from infrastructure module)
# spring.kafka.* properties are configured in the infrastructure module

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Security Configuration (basic for demo)
spring.security:
  enabled: ${SECURITY_ENABLED:false}

# Test profile configuration
---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:tc:postgresql:15-alpine:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    com.netflix.streaming.playback: DEBUG
    org.axonframework: INFO