apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: streaming-platform
  labels:
    app: kafka
    component: event-bus
    tier: messaging
spec:
  serviceName: kafka
  replicas: 3  # Production: 3+ brokers for HA
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
        component: event-bus
        tier: messaging
    spec:
      # Affinity for high availability
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - kafka
            topologyKey: kubernetes.io/hostname

      # Security context
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        runAsNonRoot: true

      containers:
      - name: kafka
        image: confluentinc/cp-kafka:7.4.0
        ports:
        - containerPort: 9092
          name: kafka-internal
          protocol: TCP
        - containerPort: 9093
          name: kafka-external
          protocol: TCP

        env:
        - name: KAFKA_BROKER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "zookeeper-0.zookeeper.streaming-platform.svc.cluster.local:2181,zookeeper-1.zookeeper.streaming-platform.svc.cluster.local:2181,zookeeper-2.zookeeper.streaming-platform.svc.cluster.local:2181"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
        - name: KAFKA_ADVERTISED_LISTENERS
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "INTERNAL"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "3"
        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: "2"
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "3"
        - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
          value: "0"
        - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
          value: "false"
        - name: KAFKA_DELETE_TOPIC_ENABLE
          value: "true"
        - name: KAFKA_NUM_PARTITIONS
          value: "6"
        - name: KAFKA_DEFAULT_REPLICATION_FACTOR
          value: "3"
        - name: KAFKA_COMPRESSION_TYPE
          value: "lz4"
        - name: KAFKA_LOG_RETENTION_HOURS
          value: "168"
        - name: KAFKA_LOG_SEGMENT_BYTES
          value: "1073741824"  # 1GB
        - name: KAFKA_MESSAGE_MAX_BYTES
          value: "1048576"  # 1MB
        - name: KAFKA_REPLICA_FETCH_MAX_BYTES
          value: "1048576"
        - name: KAFKA_MAX_CONNECTIONS_PER_IP
          value: "20"
        - name: KAFKA_CONNECTIONS_MAX_IDLE_MS
          value: "600000"
        - name: KAFKA_SOCKET_REQUEST_MAX_BYTES
          value: "104857600"  # 100MB

        # JVM settings
        - name: KAFKA_HEAP_OPTS
          value: "-Xmx2G -Xms2G"
        - name: KAFKA_JVM_PERFORMANCE_OPTS
          value: "-server -XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:+DisableExplicitGC -XX:+UseCompressedOops -XX:+AlwaysPreTouch"

        # Resource limits
        resources:
          limits:
            memory: 4Gi
            cpu: "2000m"
          requests:
            memory: 2Gi
            cpu: "1000m"

        # Liveness probe
        livenessProbe:
          exec:
            command:
            - kafka-broker-api-versions
            - --bootstrap-server
            - localhost:9092
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3

        # Readiness probe
        readinessProbe:
          exec:
            command:
            - kafka-broker-api-versions
            - --bootstrap-server
            - localhost:9092
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        # Volume mounts
        volumeMounts:
        - name: kafka-data
          mountPath: /var/lib/kafka/data
        - name: kafka-logs
          mountPath: /var/lib/kafka/logs

        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL

      # Init container for data directory setup
      initContainers:
      - name: init-kafka
        image: busybox:1.35
        command:
        - sh
        - -c
        - |
          mkdir -p /var/lib/kafka/data /var/lib/kafka/logs
          chown -R 1001:1001 /var/lib/kafka
          chmod 755 /var/lib/kafka/data /var/lib/kafka/logs
        volumeMounts:
        - name: kafka-data
          mountPath: /var/lib/kafka/data
        - name: kafka-logs
          mountPath: /var/lib/kafka/logs

      # Volumes
      volumes:
      - name: kafka-data
        persistentVolumeClaim:
          claimName: kafka-data
      - name: kafka-logs
        persistentVolumeClaim:
          claimName: kafka-logs

  # Volume claim templates
  volumeClaimTemplates:
  - metadata:
      name: kafka-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 100Gi
      storageClassName: fast-ssd
  - metadata:
      name: kafka-logs
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 50Gi
      storageClassName: standard

---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: streaming-platform
  labels:
    app: kafka
    component: event-bus
    tier: messaging
spec:
  selector:
    app: kafka
  ports:
  - name: kafka-internal
    port: 9092
    targetPort: 9092
  - name: kafka-external
    port: 9093
    targetPort: 9093
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: streaming-platform
  labels:
    app: kafka
    component: event-bus
    tier: messaging
spec:
  selector:
    app: kafka
  ports:
  - name: kafka-internal
    port: 9092
    targetPort: 9092
  clusterIP: None
  type: ClusterIP