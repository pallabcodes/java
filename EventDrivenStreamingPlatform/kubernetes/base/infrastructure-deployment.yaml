apiVersion: apps/v1
kind: Deployment
metadata:
  name: infrastructure-service
  namespace: streaming-platform
  labels:
    app: infrastructure-service
    component: event-infrastructure
    tier: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infrastructure-service
  template:
    metadata:
      labels:
        app: infrastructure-service
        component: event-infrastructure
        tier: platform
        version: v1.0.0
    spec:
      # Service account for accessing Kubernetes resources
      serviceAccountName: streaming-service-account

      # Affinity rules
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - infrastructure-service
              topologyKey: kubernetes.io/hostname

      containers:
      - name: infrastructure
        image: netflix/streaming/infrastructure-service:v1.0.0
        ports:
        - containerPort: 8081
          name: http
          protocol: TCP

        env:
        # Database configuration
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: host
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: name
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: password

        # Kafka configuration
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-0.kafka.streaming-platform.svc.cluster.local:9092,kafka-1.kafka.streaming-platform.svc.cluster.local:9092,kafka-2.kafka.streaming-platform.svc.cluster.local:9092"
        - name: SCHEMA_REGISTRY_URL
          value: "http://schema-registry.streaming-platform.svc.cluster.local:8081"

        # Redis configuration
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: host
        - name: REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: port
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: password

        # OpenTelemetry configuration
        - name: OTEL_SERVICE_NAME
          value: "infrastructure-service"
        - name: OTEL_SERVICE_VERSION
          value: "1.0.0"
        - name: OTEL_TRACES_EXPORTER
          value: "otlp"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://jaeger-collector.streaming-platform.svc.cluster.local:4317"
        - name: OTEL_METRICS_EXPORTER
          value: "prometheus"
        - name: OTEL_TRACES_SAMPLER
          value: "parentbased_always_on"

        # Application configuration
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        - name: SERVER_PORT
          value: "8081"
        - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
          value: "health,info,metrics,prometheus"
        - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
          value: "true"
        - name: LOGGING_LEVEL_COM_NETFLIX_STREAMING
          valueFrom:
            configMapKeyRef:
              name: logging-config
              key: infrastructure-log-level

        # Resource limits
        resources:
          limits:
            memory: 1Gi
            cpu: "1000m"
          requests:
            memory: 512Mi
            cpu: "500m"

        # Liveness probe
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        # Readiness probe
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        # Startup probe
        startupProbe:
          httpGet:
            path: /actuator/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 30

        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop:
            - ALL

      # Graceful shutdown
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: infrastructure-service
  namespace: streaming-platform
  labels:
    app: infrastructure-service
    component: event-infrastructure
    tier: platform
spec:
  selector:
    app: infrastructure-service
  ports:
  - name: http
    port: 80
    targetPort: 8081
    protocol: TCP
  type: ClusterIP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: streaming-service-account
  namespace: streaming-platform
  labels:
    app: infrastructure-service
    component: event-infrastructure
automountServiceAccountToken: false

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: streaming-service-role
  namespace: streaming-platform
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: streaming-service-rolebinding
  namespace: streaming-platform
subjects:
- kind: ServiceAccount
  name: streaming-service-account
  namespace: streaming-platform
roleRef:
  kind: Role
  name: streaming-service-role
  apiGroup: rbac.authorization.k8s.io