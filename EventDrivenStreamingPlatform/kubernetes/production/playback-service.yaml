apiVersion: apps/v1
kind: Deployment
metadata:
  name: playback-service
  namespace: streaming-platform
  labels:
    app: playback-service
    component: playback-engine
    tier: application
    version: v1.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: playback-service
  template:
    metadata:
      labels:
        app: playback-service
        component: playback-engine
        tier: application
        version: v1.0.0
    spec:
      serviceAccountName: streaming-service-account

      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: playback-service

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - playback-service
              topologyKey: kubernetes.io/hostname

      containers:
      - name: playback
        image: netflix/streaming/playback-service:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
          name: http
          protocol: TCP

        env:
        # Database configuration
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: host
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: playback-db-name
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: playback-username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: playback-password

        # Kafka configuration
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-0.kafka.streaming-platform.svc.cluster.local:9092,kafka-1.kafka.streaming-platform.svc.cluster.local:9092,kafka-2.kafka.streaming-platform.svc.cluster.local:9092"

        # OpenTelemetry configuration
        - name: OTEL_SERVICE_NAME
          value: "playback-service"
        - name: OTEL_SERVICE_VERSION
          value: "1.0.0"
        - name: OTEL_TRACES_EXPORTER
          value: "otlp"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://jaeger-collector.streaming-platform.svc.cluster.local:4317"
        - name: OTEL_METRICS_EXPORTER
          value: "prometheus"
        - name: OTEL_TRACES_SAMPLER
          value: "parentbased_always_on"

        # Application configuration
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        - name: SERVER_PORT
          value: "8082"
        - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
          value: "health,info,metrics,prometheus"
        - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
          value: "true"
        - name: LOGGING_LEVEL_COM_NETFLIX_STREAMING
          valueFrom:
            configMapKeyRef:
              name: logging-config
              key: playback-log-level

        # Resource limits - optimized for playback workload
        resources:
          limits:
            memory: 1.5Gi
            cpu: "1500m"
          requests:
            memory: 750Mi
            cpu: "750m"

        # Liveness probe
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: http
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        # Readiness probe
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        # Startup probe
        startupProbe:
          httpGet:
            path: /actuator/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 30

        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop:
            - ALL

        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: logs-volume
          mountPath: /app/logs

      initContainers:
      - name: wait-for-db
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z database-service 5432; do echo waiting for database; sleep 2; done;']

      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: logs-volume
        emptyDir: {}

      terminationGracePeriodSeconds: 45

---
apiVersion: v1
kind: Service
metadata:
  name: playback-service
  namespace: streaming-platform
  labels:
    app: playback-service
    component: playback-engine
    tier: application
spec:
  selector:
    app: playback-service
  ports:
  - name: http
    port: 80
    targetPort: 8082
    protocol: TCP
  type: ClusterIP

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: playback-service-pdb
  namespace: streaming-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: playback-service

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: playback-service-hpa
  namespace: streaming-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: playback-service
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 20
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 3
        periodSeconds: 60
