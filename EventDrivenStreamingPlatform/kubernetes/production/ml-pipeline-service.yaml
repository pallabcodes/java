apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-pipeline-service
  namespace: streaming-platform
  labels:
    app: ml-pipeline-service
    component: ml-engine
    tier: application
    version: v1.0.0
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: ml-pipeline-service
  template:
    metadata:
      labels:
        app: ml-pipeline-service
        component: ml-engine
        tier: application
        version: v1.0.0
    spec:
      serviceAccountName: streaming-service-account

      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: ml-pipeline-service

      containers:
      - name: ml-pipeline
        image: netflix/streaming/ml-pipeline-service:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8084
          name: http
          protocol: TCP

        env:
        # Database configuration
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: host
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: ml-db-name
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: ml-username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: ml-password

        # Kafka configuration
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-0.kafka.streaming-platform.svc.cluster.local:9092,kafka-1.kafka.streaming-platform.svc.cluster.local:9092,kafka-2.kafka.streaming-platform.svc.cluster.local:9092"

        # OpenTelemetry configuration
        - name: OTEL_SERVICE_NAME
          value: "ml-pipeline-service"
        - name: OTEL_SERVICE_VERSION
          value: "1.0.0"
        - name: OTEL_TRACES_EXPORTER
          value: "otlp"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://jaeger-collector.streaming-platform.svc.cluster.local:4317"
        - name: OTEL_METRICS_EXPORTER
          value: "prometheus"
        - name: OTEL_TRACES_SAMPLER
          value: "parentbased_always_on"

        # Application configuration
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        - name: SERVER_PORT
          value: "8084"
        - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
          value: "health,info,metrics,prometheus"
        - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
          value: "true"
        - name: LOGGING_LEVEL_COM_NETFLIX_STREAMING
          valueFrom:
            configMapKeyRef:
              name: logging-config
              key: ml-log-level

        # Resource limits - ML workloads can be resource intensive
        resources:
          limits:
            memory: 4Gi
            cpu: "3000m"
            nvidia.com/gpu: 1  # If using GPU for ML
          requests:
            memory: 2Gi
            cpu: "1500m"
            nvidia.com/gpu: 1

        # Liveness probe
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: http
            scheme: HTTP
          initialDelaySeconds: 120  # ML services take longer to start
          periodSeconds: 60
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3

        # Readiness probe
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: http
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3

        # Startup probe
        startupProbe:
          httpGet:
            path: /actuator/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 60  # ML services need more time

        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop:
            - ALL

        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: logs-volume
          mountPath: /app/logs
        - name: models-volume
          mountPath: /app/models  # For ML models

      initContainers:
      - name: wait-for-db
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z database-service 5432; do echo waiting for database; sleep 2; done;']

      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: logs-volume
        emptyDir: {}
      - name: models-volume
        emptyDir: {}  # In production, use persistent volume

      terminationGracePeriodSeconds: 120  # ML jobs need time to save state

---
apiVersion: v1
kind: Service
metadata:
  name: ml-pipeline-service
  namespace: streaming-platform
  labels:
    app: ml-pipeline-service
    component: ml-engine
    tier: application
spec:
  selector:
    app: ml-pipeline-service
  ports:
  - name: http
    port: 80
    targetPort: 8084
    protocol: TCP
  type: ClusterIP

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ml-pipeline-service-pdb
  namespace: streaming-platform
spec:
  minAvailable: 0  # Allow disruption since it's single replica
  selector:
    matchLabels:
      app: ml-pipeline-service
