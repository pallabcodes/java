name: Microservices CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-customer:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: customer_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

    - name: Run customer service tests
      working-directory: customer
      run: mvn test -Dspring.profiles.active=test

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: customer-test-results
        path: customer/target/surefire-reports/

  test-fraud:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: fraud_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Run fraud service tests
      working-directory: fraud
      run: mvn test -Dspring.profiles.active=test

  test-notification:
    runs-on: ubuntu-latest

    services:
      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Run notification service tests
      working-directory: notification
      run: mvn test -Dspring.profiles.active=test

  security-scan:
    runs-on: ubuntu-latest
    needs: [test-customer, test-fraud, test-notification]

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  build-docker:
    runs-on: ubuntu-latest
    needs: [test-customer, test-fraud, test-notification, security-scan]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push customer service
      uses: docker/build-push-action@v5
      with:
        context: ./customer
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/customer-service:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push fraud service
      uses: docker/build-push-action@v5
      with:
        context: ./fraud
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-service:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push notification service
      uses: docker/build-push-action@v5
      with:
        context: ./notification
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
    - name: Deploy to Kubernetes staging
      uses: azure/k8s-deploy@v4
      with:
        namespace: staging
        manifests: |
          k8s/customer-deployment.yaml
          k8s/fraud-deployment.yaml
          k8s/notification-deployment.yaml
        images: |
          ${{ secrets.DOCKERHUB_USERNAME }}/customer-service:${{ github.sha }}
          ${{ secrets.DOCKERHUB_USERNAME }}/fraud-service:${{ github.sha }}
          ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:${{ github.sha }}
        kubectl-version: latest

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Deploy to Kubernetes production
      uses: azure/k8s-deploy@v4
      with:
        namespace: production
        manifests: |
          k8s/customer-deployment.yaml
          k8s/fraud-deployment.yaml
          k8s/notification-deployment.yaml
        images: |
          ${{ secrets.DOCKERHUB_USERNAME }}/customer-service:${{ github.sha }}
          ${{ secrets.DOCKERHUB_USERNAME }}/fraud-service:${{ github.sha }}
          ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:${{ github.sha }}
        kubectl-version: latest