name: Netflix Microservices CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

env:
  MAVEN_OPTS: "-Xmx1024m -XX:+UseG1GC"
  JAVA_VERSION: "17"
  MAVEN_VERSION: "3.9.5"

jobs:
  # ===========================================
  # CODE QUALITY CHECKS
  # ===========================================
  
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Run SpotBugs Analysis
      run: |
        mvn clean compile spotbugs:check -Dspotbugs.failOnError=true
      env:
        MAVEN_OPTS: ${{ env.MAVEN_OPTS }}

    - name: Run Checkstyle Analysis
      run: |
        mvn clean compile checkstyle:check -Dcheckstyle.failOnViolation=true
      env:
        MAVEN_OPTS: ${{ env.MAVEN_OPTS }}

    - name: Run PMD Analysis
      run: |
        mvn clean compile pmd:check -Dpmd.failOnViolation=true
      env:
        MAVEN_OPTS: ${{ env.MAVEN_OPTS }}

    - name: Upload SpotBugs Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: spotbugs-results
        path: target/spotbugsXml.xml

    - name: Upload Checkstyle Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: checkstyle-results
        path: target/checkstyle-result.xml

    - name: Upload PMD Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: pmd-results
        path: target/pmd.xml

  # ===========================================
  # UNIT TESTS
  # ===========================================
  
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: code-quality
    
    strategy:
      matrix:
        service: [customer-service, fraud-service, notification-service, api-gateway, service-registry, shared-libraries]
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Run Unit Tests
      run: |
        mvn clean test -pl ${{ matrix.service }} -Dtest.forkCount=2 -Dtest.reuseForks=false
      env:
        MAVEN_OPTS: ${{ env.MAVEN_OPTS }}

    - name: Generate Test Report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Unit Tests (${{ matrix.service }})
        path: ${{ matrix.service }}/target/surefire-reports/*.xml
        reporter: java-junit

    - name: Upload Test Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ matrix.service }}
        path: ${{ matrix.service }}/target/surefire-reports/

  # ===========================================
  # INTEGRATION TESTS
  # ===========================================
  
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: unit-tests
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      rabbitmq:
        image: rabbitmq:3.12-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: test_user
          RABBITMQ_DEFAULT_PASS: test_password
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Run Integration Tests
      run: |
        mvn clean verify -Dspring.profiles.active=test -Dtestcontainers.reuse.enable=true
      env:
        MAVEN_OPTS: ${{ env.MAVEN_OPTS }}
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_db
        SPRING_DATASOURCE_USERNAME: test_user
        SPRING_DATASOURCE_PASSWORD: test_password
        SPRING_RABBITMQ_HOST: localhost
        SPRING_RABBITMQ_USERNAME: test_user
        SPRING_RABBITMQ_PASSWORD: test_password

    - name: Generate Integration Test Report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Integration Tests
        path: */target/failsafe-reports/*.xml
        reporter: java-junit

    - name: Upload Integration Test Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: integration-test-results
        path: */target/failsafe-reports/

  # ===========================================
  # SECURITY SCANNING
  # ===========================================
  
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: code-quality
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Run OWASP Dependency Check
      run: |
        mvn clean compile org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7
      env:
        MAVEN_OPTS: ${{ env.MAVEN_OPTS }}

    - name: Upload Security Scan Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-scan-results
        path: */target/dependency-check-report.html

  # ===========================================
  # PERFORMANCE TESTS
  # ===========================================
  
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: integration-tests
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Run Performance Tests
      run: |
        mvn clean test -Dtest=*PerformanceTest -Dspring.profiles.active=test
      env:
        MAVEN_OPTS: ${{ env.MAVEN_OPTS }}

    - name: Upload Performance Test Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: performance-test-results
        path: */target/surefire-reports/

  # ===========================================
  # BUILD AND PACKAGE
  # ===========================================
  
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [unit-tests, integration-tests, security-scan]
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build Application
      run: |
        mvn clean package -DskipTests -Dmaven.javadoc.skip=true
      env:
        MAVEN_OPTS: ${{ env.MAVEN_OPTS }}

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: |
          */target/*.jar
          */target/*.war

  # ===========================================
  # DOCKER BUILD
  # ===========================================
  
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    if: github.event_name == 'push' || github.event_name == 'release'
    
    strategy:
      matrix:
        service: [customer-service, fraud-service, notification-service, api-gateway, service-registry]
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ${{ matrix.service }}/Dockerfile
        push: true
        tags: |
          netflix/${{ matrix.service }}:latest
          netflix/${{ matrix.service }}:${{ github.sha }}
          netflix/${{ matrix.service }}:${{ github.ref_name }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ===========================================
  # DEPLOYMENT
  # ===========================================
  
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [docker-build, performance-tests]
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    environment: staging
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to Staging
      run: |
        echo "Deploying to staging environment..."
        # Add your deployment logic here
        # Example: kubectl apply -f k8s/staging/

    - name: Run Smoke Tests
      run: |
        echo "Running smoke tests..."
        # Add your smoke test logic here

  # ===========================================
  # PRODUCTION DEPLOYMENT
  # ===========================================
  
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: deploy
    if: github.event_name == 'release'
    environment: production
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to Production
      run: |
        echo "Deploying to production environment..."
        # Add your production deployment logic here

    - name: Run Production Smoke Tests
      run: |
        echo "Running production smoke tests..."
        # Add your production smoke test logic here

  # ===========================================
  # NOTIFICATION
  # ===========================================
  
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [deploy, deploy-production]
    if: always()
    
    steps:
    - name: Notify Success
      if: needs.deploy.result == 'success' || needs.deploy-production.result == 'success'
      run: |
        echo "✅ Deployment successful!"
        # Add your success notification logic here

    - name: Notify Failure
      if: needs.deploy.result == 'failure' || needs.deploy-production.result == 'failure'
      run: |
        echo "❌ Deployment failed!"
        # Add your failure notification logic here
