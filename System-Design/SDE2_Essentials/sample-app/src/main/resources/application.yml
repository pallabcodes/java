server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: sde2-essentials-sample
  datasource:
    # using routing datasource bean, targets defined in config
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/sde2-essentials}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      service: sde2-essentials-sample
      environment: ${SPRING_PROFILES_ACTIVE:dev}
      version: 1.0.0
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://otel-collector:4318/v1/traces}
    metrics:
      export:
        enabled: ${OTLP_METRICS_ENABLED:false}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9090}

# Custom application configuration
app:
  security:
    rate-limit:
      requests-per-minute: ${RATE_LIMIT_REQUESTS_PER_MINUTE:100}
      refill-period-minutes: ${RATE_LIMIT_REFILL_PERIOD_MINUTES:1}
  monitoring:
    health-check-interval: ${HEALTH_CHECK_INTERVAL:30s}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.example: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
  pattern:
    console: "%msg%n"
  logback:
    rollingpolicy:
      max-history: ${LOG_MAX_HISTORY:7}
      max-file-size: ${LOG_MAX_FILE_SIZE:10MB}

