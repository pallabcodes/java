# Netflix-scale configuration
spring:
  application:
    name: productivity-platform
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:https://idp.example.com/tenant}
          jwk-set-uri: ${OIDC_JWKS_URI:https://idp.example.com/tenant/.well-known/jwks.json}
          audiences: ${OIDC_AUDIENCES:productivity-api}
          principal-claim: ${OIDC_PRINCIPAL_CLAIM:sub}
  
  # Eureka Service Discovery
  cloud:
    discovery:
      enabled: true
    loadbalancer:
      ribbon:
        enabled: true
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/productivity
    username: productivity_user
    password: ${DB_PASSWORD:secure_password}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  
  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        generate_statistics: false
        cache:
          use_second_level_cache: true
          use_query_cache: true
          region:
            factory_class: org.hibernate.cache.jcache.JCacheRegionFactory

# mTLS placeholders (use when terminating TLS in app, else terminate at mesh/edge)
server:
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEYSTORE:classpath:tls/server-keystore.p12}
    key-store-password: ${SERVER_SSL_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${SERVER_SSL_KEYSTORE_TYPE:PKCS12}
    trust-store: ${SERVER_SSL_TRUSTSTORE:classpath:tls/server-truststore.p12}
    trust-store-password: ${SERVER_SSL_TRUSTSTORE_PASSWORD:changeit}
    trust-store-type: ${SERVER_SSL_TRUSTSTORE_TYPE:PKCS12}
    client-auth: ${SERVER_SSL_CLIENT_AUTH:need}

# Netflix OSS Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

# Archaius Dynamic Configuration
archaius:
  config-source:
    default:
      polling-interval-ms: 30000
  property:
    sources:
      - type: system
      - type: environment
      - type: classpath
        resource: application.properties

# Hystrix Circuit Breaker Configuration
hystrix:
  command:
    default:
      execution:
        timeout:
          enabled: true
        isolation:
          thread:
            timeout-in-milliseconds: 30000
      circuit-breaker:
        request-volume-threshold: 20
        error-threshold-percentage: 50
        sleep-window-in-milliseconds: 5000
      metrics:
        rolling-stats:
          time-in-milliseconds: 10000
  threadpool:
    default:
      core-size: 10
      maximum-size: 50
      max-queue-size: 100

# Ribbon Load Balancer Configuration
ribbon:
  ConnectTimeout: 3000
  ReadTimeout: 10000
  MaxAutoRetries: 1
  MaxAutoRetriesNextServer: 2
  OkToRetryOnAllOperations: false

# Sleuth Distributed Tracing
spring:
  sleuth:
    zipkin:
      base-url: ${ZIPKIN_URL:http://localhost:9411}
    sampler:
      probability: 1.0

# Management and Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

# Vault integration placeholders
spring:
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:false}
      host: ${VAULT_HOST:localhost}
      port: ${VAULT_PORT:8200}
      scheme: ${VAULT_SCHEME:http}
      uri: ${VAULT_URI:http://localhost:8200}
      token: ${VAULT_TOKEN:}
      kv:
        enabled: true
        backend: ${VAULT_KV_BACKEND:secret}
        application-name: ${spring.application.name}
      authentication: ${VAULT_AUTH_METHOD:token}
      fail-fast: false
# Application Configuration
app:
  jwt:
    secret: ${JWT_SECRET:your-secret-key-change-in-production}
    expiration: 86400000
  multitenancy:
    enabled: true
  rate-limiting:
    enabled: true
    default-limit: 1000
    burst-capacity: 2000
  attachments:
    storage:
      type: minio
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket-name: productivity-attachments
  webhooks:
    retry:
      max-attempts: 3
      backoff-delay: 1000
      max-delay: 10000
    timeout: 30000
  reporting:
    cache:
      ttl: 300
      max-size: 1000
  logout:
    backchannel:
      enabled: ${BACKCHANNEL_LOGOUT_ENABLED:false}
      redis-channel: ${BACKCHANNEL_LOGOUT_CHANNEL:auth:logout}
  opa:
    enabled: ${OPA_ENABLED:false}
    base-url: ${OPA_BASE_URL:http://localhost:8181}
    policy-path: ${OPA_POLICY_PATH:/v1/data/productivity/allow}
  permission-cache:
    enabled: ${PERMISSION_CACHE_ENABLED:true}
    ttl-seconds: ${PERMISSION_CACHE_TTL:300}
  login:
    throttling:
      enabled: ${LOGIN_THROTTLING_ENABLED:true}
      max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
      window-seconds: ${LOGIN_WINDOW_SECONDS:300}
      block-seconds: ${LOGIN_BLOCK_SECONDS:900}
  refresh-tokens:
    device-binding-enabled: ${REFRESH_DEVICE_BINDING_ENABLED:true}
    reuse-detection-enabled: ${REFRESH_REUSE_DETECTION_ENABLED:true}
    fingerprint-headers: ${REFRESH_FINGERPRINT_HEADERS:X-Device-Id,X-Client-Version}
  mesh:
    policy:
      retries: ${MESH_RETRIES:2}
      timeout-ms: ${MESH_TIMEOUT_MS:5000}
      circuit-breaker-threshold: ${MESH_CB_THRESHOLD:20}
  logging:
    shipper:
      enabled: ${LOG_SHIPPER_ENABLED:false}
      endpoint: ${LOG_SHIPPER_ENDPOINT:http://loki.example.com}
      api-key: ${LOG_SHIPPER_API_KEY:}
  spiffe:
    enabled: ${SPIFFE_ENABLED:false}
    trust-domain: ${SPIFFE_TRUST_DOMAIN:example.org}
    workload-selector: ${SPIFFE_SELECTOR:k8s:ns/default}

# Logging Configuration
logging:
  level:
    com.netflix.productivity: INFO
    org.springframework.cloud: DEBUG
    com.netflix.hystrix: DEBUG
    com.netflix.eureka: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
  file:
    name: logs/productivity-platform.log
    max-size: 100MB
    max-history: 30

# Kafka configuration
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      acks: all
      enable-idempotence: true
      retries: 5
      properties:
        delivery.timeout.ms: 120000
        linger.ms: 10
        request.timeout.ms: 30000
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    properties:
      max.in.flight.requests.per.connection: 1
      allow.auto.create.topics: true

app:
  kafka:
    outbox:
      topic-audit: ${OUTBOX_TOPIC_AUDIT:productivity.audit}
      topic-webhook: ${OUTBOX_TOPIC_WEBHOOK:productivity.webhook}
      batch-size: ${OUTBOX_BATCH_SIZE:200}
      dispatch-interval-ms: ${OUTBOX_DISPATCH_INTERVAL_MS:2000}
