apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: core
  namespace: productivity
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: core
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
