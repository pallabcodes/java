apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: reporting
  namespace: productivity
spec:
  host: reporting
  subsets:
    - name: v1
      labels:
        version: v1
    - name: v2
      labels:
        version: v2
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
