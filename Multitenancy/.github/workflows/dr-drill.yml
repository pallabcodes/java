name: dr-drill
on:
  schedule:
    - cron: '0 9 1 */3 *'
  workflow_dispatch:
jobs:
  drill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: print runbook
        run: cat docs/runbooks/DR_DRILL.md
      - name: capture evidence folder
        run: |
          mkdir -p evidence
          date > evidence/timestamp.txt
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dr-evidence
          path: evidence

