name: Multitenancy CI

on:
  push:
    paths:
      - 'Multitenancy/**'
      - '.github/workflows/multitenancy-ci.yml'
  pull_request:
    paths:
      - 'Multitenancy/**'

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build & Test
        working-directory: Multitenancy
        run: |
          mvn -q -DskipITs test
          mvn -q -DskipUTs verify

      - name: Package
        working-directory: Multitenancy
        run: |
          mvn -q -DskipTests package
