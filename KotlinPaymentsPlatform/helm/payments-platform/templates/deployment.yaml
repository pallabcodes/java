{{- range $service := list "api-gateway" "payments-service" "risk-service" "ledger-service" }}
{{- if $.Values.$service.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "payments-platform.fullname" $ }}-{{ $service }}
  labels:
    {{- include "payments-platform.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $service }}
spec:
  replicas: {{ $.Values.$service.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "payments-platform.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $service }}
  template:
    metadata:
      labels:
        {{- include "payments-platform.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $service }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") $ | sha256sum }}
    spec:
      {{- with $.Values.security.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "payments-platform.serviceAccountName" $ }}
      containers:
        - name: {{ $service }}
          image: "{{ $.Values.global.imageRegistry }}/{{ $.Values.$service.image.repository }}:{{ $.Values.$service.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.$service.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $.Values.$service.service.targetPort }}
              protocol: TCP
          env:
            {{- range $key, $value := $.Values.$service.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: JAVA_OPTS
              value: "-XX:+UseG1GC -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom"
          {{- with $.Values.$service.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $.Values.security.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: logs-volume
              mountPath: /var/log/payments
      volumes:
        - name: tmp-volume
          emptyDir: {}
        - name: logs-volume
          emptyDir: {}
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
