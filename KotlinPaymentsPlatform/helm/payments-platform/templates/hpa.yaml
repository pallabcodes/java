{{- range $service := list "api-gateway" "payments-service" "risk-service" "ledger-service" }}
{{- if $.Values.$service.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "payments-platform.fullname" $ }}-{{ $service }}-hpa
  labels:
    {{- include "payments-platform.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $service }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "payments-platform.fullname" $ }}-{{ $service }}
  minReplicas: {{ $.Values.$service.minReplicas | default 1 }}
  maxReplicas: {{ $.Values.$service.maxReplicas | default 10 }}
  metrics:
    {{- if $.Values.$service.hpa.metrics }}
    {{- toYaml $.Values.$service.hpa.metrics | nindent 4 }}
    {{- else }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
{{- end }}
{{- end }}
