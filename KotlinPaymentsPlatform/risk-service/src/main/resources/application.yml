server:
  port: 8083

spring:
  application:
    name: risk-service
  profiles:
    active: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/risk_service}
    username: ${DB_USERNAME:risk_user}
    password: ${DB_PASSWORD:risk_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:kotlin-payments-jwt-secret-key}
  access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:3600000}
  refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: risk-service
      environment: dev
      version: 1.0.0

logging:
  level:
    root: INFO
    com.example.kotlinpay: DEBUG
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{correlationId}] %-5level %logger{36} - %msg%n"
    file:
      name: logs/${spring.application.name}.log
      max-size: 10MB
      max-history: 30
