server:
  port: 8083

spring:
  application:
    name: risk-service
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/risk_service
    username: risk_user
    password: risk_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  security:
    user:
      name: risk_admin
      password: risk_password

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.example.kotlinpay.risk: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
