apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payments-platform
  namespace: argocd
  labels:
    app.kubernetes.io/name: payments-platform
    app.kubernetes.io/part-of: payments-platform
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: payments-platform
  source:
    repoURL: https://github.com/your-org/KotlinPaymentsPlatform
    targetRevision: HEAD
    path: helm/payments-platform
    helm:
      valueFiles:
      - values.yaml
      - values-prod.yaml
      parameters:
      - name: global.env
        value: production
      - name: image.tag
        value: $ARGOCD_APP_REVISION
  destination:
    server: https://kubernetes.default.svc
    namespace: payments-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payments-platform-monitoring
  namespace: argocd
  labels:
    app.kubernetes.io/name: payments-platform-monitoring
    app.kubernetes.io/part-of: payments-platform
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: payments-platform
  source:
    repoURL: https://github.com/your-org/KotlinPaymentsPlatform
    targetRevision: HEAD
    path: monitoring
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payments-platform-databases
  namespace: argocd
  labels:
    app.kubernetes.io/name: payments-platform-databases
    app.kubernetes.io/part-of: payments-platform
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: payments-platform
  source:
    repoURL: https://github.com/your-org/KotlinPaymentsPlatform
    targetRevision: HEAD
    path: infrastructure/databases
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: database
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
